<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클린창원 - 시민 참여형 쓰레기 신고 플랫폼</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; margin-top: 15px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .report-list { margin-top: 20px; }
        .report-item { background: #eee; padding: 10px; margin-top: 10px; border-radius: 4px; position: relative; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .delete-btn:hover { background: #c82333; }
    </style>
</head>
<body>

<div class="container">
    <h1>클린창원 - 시민 참여형 쓰레기 신고 플랫폼</h1>
    
    <form id="reportForm">
        <label for="location">위치 (창원시 구/동 입력):</label>
        <input type="text" id="location" required placeholder="예: 성산구 상남동">

        <label for="reportType">쓰레기 종류:</label>
        <select id="reportType" required>
            <option value="">선택하세요</option>
            <option value="생활쓰레기">생활쓰레기</option>
            <option value="대형폐기물">대형폐기물</option>
            <option value="재활용품">재활용품</option>
            <option value="기타">기타</option>
        </select>

        <label for="description">상세 설명:</label>
        <textarea id="description" rows="4" required placeholder="상황을 설명해주세요"></textarea>

        <button type="submit">신고하기</button>
    </form>

    <h2>신고 내역</h2>
    <div class="report-list" id="reportList"></div>
</div>

<script>
    // 1. [추가] 브라우저 저장소(LocalStorage)에서 기존에 저장된 신고 내역 불러오기
    let reports = JSON.parse(localStorage.getItem('clean_reports')) || [];

    // 2. [수정] 신고 목록을 화면에 그려주는 함수 (저장된 데이터를 기반으로 재생성)
    function renderReports() {
        const reportList = document.getElementById('reportList');
        reportList.innerHTML = ''; // 기존 목록 비우기

        reports.forEach((report, index) => {
            const div = document.createElement('div');
            div.className = 'report-item';
            div.innerHTML = `
                <p><strong>위치:</strong> ${escapeHtml(report.location)}</p>
                <p><strong>종류:</strong> ${escapeHtml(report.type)}</p>
                <p><strong>설명:</strong> ${escapeHtml(report.description)}</p>
                <button class="delete-btn" onclick="deleteReport(${index})">삭제</button>
            `;
            reportList.appendChild(div);
        });
    }

    // 3. 원래 있던 신고하기 기능에 '저장 기능'만 추가
    document.getElementById('reportForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const location = document.getElementById('location').value;
        const type = document.getElementById('reportType').value;
        const description = document.getElementById('description').value;

        // 새 데이터를 배열에 추가
        reports.push({ location, type, description });

        // 💾 [추가] 로컬스토리지에 데이터 영구 저장 (새로고침해도 안 지워지게!)
        localStorage.setItem('clean_reports', JSON.stringify(reports));

        // 화면 새로고침 및 폼 비우기
        renderReports();
        document.getElementById('reportForm').reset();
    });

    // 4. [추가] 내역 삭제 기능 (지우고 싶을 때 사용)
    function deleteReport(index) {
        if (confirm("이 신고 내역을 삭제하시겠습니까?")) {
            reports.splice(index, 1); // 배열에서 삭제
            localStorage.setItem('clean_reports', JSON.stringify(reports)); // 저장소 업데이트
            renderReports(); // 화면 갱신
        }
    }

    // 보안을 위한 글자 변환 함수 (XSS 방지)
    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    // 5. [추가] 페이지가 처음 켜질 때 저장된 데이터가 있으면 화면에 띄우기
    window.onload = renderReports;
</script>

</body>
</html>
